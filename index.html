<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hello World</title>
    <meta name="description" content="A beautiful Hello World starting point">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container" id="main-container">
        <div class="glass-card">
            <h1 class="title">Hello World <span class="wave">👋</span></h1>
            <p class="subtitle">Welcome to your breathtaking new website.</p>
            <button class="action-btn" id="start-btn">Get Started</button>
        </div>
    </div>
    <script>
        document.getElementById('start-btn').addEventListener('click', function() {
            this.textContent = 'Awesome!';
            this.classList.add('clicked');
            setTimeout(() => {
                this.textContent = 'Get Started';
                this.classList.remove('clicked');
            }, 2000);
        });
    </script>
</body>
</html>
