<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Maria Giulia Brognoli | Blog & Allenamenti</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>

<body>
    <div class="background-texture"></div>

    <nav class="glass-navbar">
        <div class="nav-content">
            <h1 class="logo">M.G. BROGNOLI <span class="badge">UEFA C</span></h1>
            <ul class="nav-links">
                <li><a href="index.html" class="active">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="allenamenti.html">Allenamenti</a></li>
                <li><a href="forum.html">Forum</a></li>
                <li><a href="io.html">Io</a></li>
            </ul>
        </div>
    </nav>

    <header class="hero container">
        <div class="carousel">
            <div class="slide active">
                <img src="https://images.unsplash.com/photo-1518605368461-1ee12523ccdf?q=80&w=2670" alt="Training">
                <div class="glass-overlay">
                    <h2>Preparazione Atletica e Tattica</h2>
                    <p>Migliora la tua squadra attraverso metodologie moderne e un approccio scientifico al campo.</p>
                </div>
            </div>
        </div>
    </header>

    <main class="container">
        <section class="split-section">
            <div class="main-column">
                <div class="section-title">
                    <h2>Ultime Pubblicazioni</h2>
                    <a href="blog.html" class="view-all">Vedi tutte <i class="fa-solid fa-arrow-right"></i></a>
                </div>

                <div class="posts-list">
                    <!-- Posts dinamicamente caricati -->
                </div>
            </div>

            <aside class="forum-column">
                <div class="section-title">
                    <h2>Forum Live</h2>
                </div>
                <div class="glass-chat" style="height: 400px; padding: 10px;">
                    <div id="tlkio" data-channel="brognoli-allenatori-home" data-theme="theme--minimal"
                        style="width:100%;height:100%;"></div>
                    <script async src="https://tlk.io/embed.js" type="text/javascript"></script>
                </div>
            </aside>
        </section>

        <section class="trainings-section">
            <div class="section-title">
                <h2>Rassegna Allenamenti</h2>
            </div>
            <div class="clean-grid">
                <!-- Allenamenti dinamicamente caricati -->
            </div>
        </section>

    <script src="js/app.js"></script>
