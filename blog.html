<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Blog | Maria Giulia Brognoli</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            text-align: center;
            padding: 80px 20px 40px;
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header h2 {
            font-size: 3rem;
            color: var(--secondary);
            font-weight: 800;
            margin-bottom: 15px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1.2rem;
        }

        .blog-grid {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 40px;
            margin-bottom: 80px;
        }

        .clean-post.vertical {
            flex-direction: column;
            align-items: flex-start;
            background: white;
            padding: 20px;
            border-radius: 20px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
            transition: transform 0.3s, box-shadow 0.3s;
        }

        .clean-post.vertical:hover {
            transform: translateY(-5px);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.08);
        }

        .clean-post.vertical img {
            width: 100%;
            height: 250px;
            margin-bottom: 20px;
        }

        .read-more-link {
            display: inline-block;
            margin-top: 15px;
            color: var(--primary);
            font-weight: 600;
            text-decoration: none;
            transition: color 0.2s;
        }

        .read-more-link:hover {
            color: var(--secondary);
        }

        @media (max-width: 900px) {
            .blog-grid {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="background-texture"></div>

    <nav class="glass-navbar">
        <div class="nav-content">
            <h1 class="logo">M.G. BROGNOLI <span class="badge">UEFA C</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html" class="active">Blog</a></li>
                <li><a href="allenamenti.html">Allenamenti</a></li>
                <li><a href="forum.html">Forum</a></li>
                <li><a href="io.html">Io</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>Blog & Pubblicazioni</h2>
            <p>Articoli, approfondimenti tattici e metodologie per migliorare il gioco della tua squadra.</p>
        </header>

        <div class="blog-grid">
            <!-- I post verranno caricati qui dinamicamente da app.js -->
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
