<!DOCTYPE html>
<html lang="it">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Allenamenti | Maria Giulia Brognoli</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        .page-header {
            text-align: center;
            padding: 80px 20px 60px;
            max-width: 800px;
            margin: 0 auto;
        }

        .page-header h2 {
            font-size: 3rem;
            color: var(--secondary);
            font-weight: 800;
            margin-bottom: 15px;
        }

        .page-header p {
            color: var(--text-light);
            font-size: 1.2rem;
        }

        .drills-grid-large {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 30px;
            margin-bottom: 80px;
        }

        .training-item {
            background: white;
            padding: 15px;
            border-radius: 20px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.03);
            border: 1px solid rgba(0, 0, 0, 0.05);
        }

        .training-item h3 {
            margin-top: 15px;
            font-size: 1.2rem;
            color: var(--text);
        }

        .tag-row {
            display: flex;
            gap: 10px;
            margin-top: 10px;
        }

        .drill-tag {
            font-size: 0.75rem;
            background: var(--background);
            color: var(--primary);
            padding: 4px 12px;
            border-radius: 20px;
            font-weight: 600;
        }

        @media (max-width: 1024px) {
            .drills-grid-large {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 768px) {
            .drills-grid-large {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>

<body>
    <div class="background-texture"></div>

    <nav class="glass-navbar">
        <div class="nav-content">
            <h1 class="logo">M.G. BROGNOLI <span class="badge">UEFA C</span></h1>
            <ul class="nav-links">
                <li><a href="index.html">Home</a></li>
                <li><a href="blog.html">Blog</a></li>
                <li><a href="allenamenti.html" class="active">Allenamenti</a></li>
                <li><a href="forum.html">Forum</a></li>
                <li><a href="io.html">Io</a></li>
            </ul>
        </div>
    </nav>

    <main class="container">
        <header class="page-header">
            <h2>Libreria Allenamenti</h2>
            <p>Esplora il mio database di esercitazioni organizzate per obiettivo tecnico, tattico e condizionale.</p>
        </header>

        <div class="drills-grid-large">
            <!-- Gli allenamenti verranno caricati qui dinamicamente da app.js -->
        </div>
    </main>

    <script src="js/app.js"></script>
</body>

</html>
